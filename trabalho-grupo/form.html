<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <!--Estilização-->
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <script src="assets/bootstrap/js/bootstrap.min.js"></script>
    <!--Lib-->
    <script type="module" src="assets/JS/lib.js"></script>
</head>

<body class="container">
    <h1>Formulário Bolado</h1>
    <form action="" method="post">
        <fieldset>
            <label for="marca">Marca</label> <br>
            <select name="marca" id="marca">
                <option value="DATEN">Daten</option>
                <option value="POSITIVO_NOVO">Postivo Novo</option>
                <option value="POSITIVO_VELHO">Positivo Velho</option>
            </select>
        </fieldset>

        <fieldset>
            <label for="situacao">Situação</label> <br>
            <select name="situacao" id="situacao">
                <option value="FUNCIONANDO">Funcionando</option>
                <option value="NAO_FUNCIONANDO">Não Funcionando</option>
            </select>
        </fieldset>

        <fieldset>
            <label for="desc">Descricão</label> <br>
            <input type="text" name="nota" id="nota">
        </fieldset>

        <fieldset>
            <label for="imagem">Envie uma imagem do PC</label>
            <input type="file" name="imagem" accept="image/*" id="imagem" placeholder="Envie uma imagem">
        </fieldset>

        <fieldset>
            <label for=""></label>
        </fieldset>

        <br>

        <input type="submit" value="Enviar">

    </form>
    <button><a href="admin.html">Voltar</a></button>
</body>

</html>
